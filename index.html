<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Skill Command Center</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="page-header">
      <h1 class="page-header__title">Skill Command Center</h1>
    </header>

    <main class="dashboard">
      <section class="daily-focus">
        <h2 class="daily-focus__label">This Week's Focus</h2>
        <p class="daily-focus__skill">Gym Routine</p>
        <p class="daily-focus__note">Visit the gym 3 times a week, spending an hour each day.</p>
      </section>

      <section class="skills-grid">
        <h2>Skills In Progress</h2>
      </section>

      <section class="travel-wishlist">
        <h2>Travel Wishlist</h2>
      </section>

      <section class="intention">
        <h2>Intention</h2>
      </section>

      <section class="snapshot">
        <h2>Monthly Snapshot</h2>
      </section>
    </main>

    <footer class="page-footer">
      <p>Built from scratch by Carmine Stroman - v1, June 2026</p>
    </footer>
  </body>
</html>
